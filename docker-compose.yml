# Yggdrasight Trading — Infrastructure Services
# Dev server runs on host via: pnpm dev
# Start services: docker compose up -d
# Stop services: docker compose down

services:
  mongodb:
    image: mongo:7
    container_name: yggdrasight-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: yggdrasight
      MONGO_INITDB_ROOT_PASSWORD: yggdrasight_dev_secret
      MONGO_INITDB_DATABASE: yggdrasight
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - yggdrasight-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: yggdrasight-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-yggdrasight_redis_secret}
    volumes:
      - redis_data:/data
    networks:
      - yggdrasight-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-yggdrasight_redis_secret}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Mongo Express — DISABLED in production ──────────────────────────────────
  # Uncomment for local debugging only. Do NOT expose in production.
  # mongo-express:
  #   image: mongo-express:latest
  #   container_name: yggdrasight-mongo-express
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:8081:8081"
  #   environment:
  #     ME_CONFIG_MONGODB_ADMINUSERNAME: yggdrasight
  #     ME_CONFIG_MONGODB_ADMINPASSWORD: yggdrasight_dev_secret
  #     ME_CONFIG_MONGODB_URL: mongodb://yggdrasight:yggdrasight_dev_secret@mongodb:27017/
  #     ME_CONFIG_BASICAUTH: "true"
  #     ME_CONFIG_BASICAUTH_USERNAME: admin
  #     ME_CONFIG_BASICAUTH_PASSWORD: CHANGE_THIS
  #   depends_on:
  #     - mongodb
  #   networks:
  #     - yggdrasight-network

  mirofish-backend:
    build:
      context: ./docker/mirofish/backend
      dockerfile: Dockerfile
    container_name: yggdrasight-mirofish
    ports:
      - "127.0.0.1:5001:5001"
    env_file:
      - ./docker/mirofish/.env
    volumes:
      - ./docker/mirofish/backend/uploads:/app/uploads
      - ./docker/mirofish/results:/app/results
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - yggdrasight-network

volumes:
  mongodb_data:
  redis_data:

networks:
  yggdrasight-network:
    driver: bridge
    name: yggdrasight-network
