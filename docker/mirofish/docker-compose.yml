services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${FLASK_PORT:-5001}:5001"
    env_file:
      - .env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./results:/app/results
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/graph/projects"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped